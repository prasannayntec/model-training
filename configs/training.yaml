base_model_name: Qwen/Qwen2.5-1.5B-Instruct

output_root: outputs
adapter_output_root: adapters
log_root: logs

train_dataset_path: datasets/academic/train/train.jsonl
validation_dataset_path: datasets/academic/validation/validation.jsonl
test_dataset_path: datasets/academic/test/test.jsonl

max_seq_length: 1024

num_train_epochs: 5

per_device_train_batch_size: 1
per_device_eval_batch_size: 1

gradient_accumulation_steps: 8

learning_rate: 2.0e-4
weight_decay: 0.01
warmup_ratio: 0.03

logging_steps: 10

evaluation_strategy: steps
eval_steps: 50

save_strategy: steps
save_steps: 50
save_total_limit: 3

seed: 42

bf16: false
fp16: true          # <-- Change this

gradient_checkpointing: true

max_grad_norm: 1.0

lr_scheduler_type: cosine

report_to:
  - tensorboard

generate_during_evaluation: true
generation_max_new_tokens: 256